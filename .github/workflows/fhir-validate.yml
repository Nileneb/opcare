name: fhir-validate

# Konformitäts-Gate Richtung ePflegebericht-MIO: exportiert ein FHIR-R4-Document-Bundle
# und validiert es mit dem amtlichen HL7-FHIR-Validator. Wächst mit, wenn KBV/MIO-Profile
# fest werden (dann -ig hl7.fhir.de... bzw. das ePflegebericht-Package ergänzen).

permissions:
  contents: read

on:
  push:
    branches: [master, 'feat/**', 'fix/**', 'chore/**']
  pull_request:
    branches: [master]

jobs:
  fhir:
    runs-on: ubuntu-latest
    env:
      DB_CONNECTION: sqlite
      DB_DATABASE: ${{ github.workspace }}/database/ci.sqlite
      # WHY: .env.example fährt Session/Queue/Cache über Redis (Horizon) — im CI nicht vorhanden.
      # Reale Env-Vars überschreiben die .env-Werte (phpdotenv-immutable).
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      BROADCAST_CONNECTION: log
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, intl, bcmath, gd
          tools: composer:v2
          coverage: none

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch "$DB_DATABASE"

      - name: Migrate + seed (SQLite)
        run: php artisan migrate --force --seed

      - name: Export FHIR bundle
        run: php artisan fhir:export --output=fhir_bundle.json

      - name: Cache FHIR validator + terminology
        uses: actions/cache@v4
        with:
          path: |
            validator_cli.jar
            ~/.fhir
          key: fhir-validator-r4-v1

      - name: Download validator (if not cached)
        run: |
          if [ ! -f validator_cli.jar ]; then
            curl -fsSL -o validator_cli.jar \
              https://github.com/hapifhir/org.hl7.fhir.core/releases/latest/download/validator_cli.jar
          fi

      # ÜLB-Paket mitgeladen: Das Bundle claimt durchgängig meta.profile (Bundle → KBV_PR_MIO_ULB_Bundle,
      # Composition + alle Sektions-Ressourcen → ihre ÜLB-Profile). meta.profile treibt die Validierung →
      # dieser Schritt erzwingt die volle ÜLB-Konformität und bricht bei Abweichung.
      - name: Validate against FHIR R4 + de.basisprofil.r4 + ÜLB-MIO (fails on errors)
        run: java -jar validator_cli.jar fhir_bundle.json -version 4.0.1 -ig de.basisprofil.r4#1.5.0 -ig kbv.mio.ueberleitungsbogen#1.0.0 -tx n/a

      # Expliziter, blockierender Check gegen das ÜLB-Bundle-Profil — Konformitäts-Garantie auch dann,
      # falls Bundle.meta.profile je entfernt würde. Track A: Composition + Bundle sind ÜLB-konform.
      - name: ÜLB-MIO-Bundle-Profil erzwingen (fails on errors)
        run: |
          java -jar validator_cli.jar fhir_bundle.json -version 4.0.1 \
            -ig de.basisprofil.r4#1.5.0 -ig kbv.mio.ueberleitungsbogen#1.0.0 \
            -profile https://fhir.kbv.de/StructureDefinition/KBV_PR_MIO_ULB_Bundle -tx n/a
