name: security

# Track B (Security-Hygiene), messbar: Supply-Chain-CVE-Gate (composer audit) + SAST (Semgrep).
# Beide blockierend: bekannte Dependency-CVE im Lock ODER ein ERROR-Finding der statischen
# Security-Analyse lässt den Build fehlschlagen.

permissions:
  contents: read

on:
  push:
    branches: [master, 'feat/**', 'fix/**', 'chore/**']
  pull_request:
    branches: [master]
  schedule:
    # WHY: neue CVEs erscheinen auch ohne Code-Änderung — wöchentlicher Re-Check
    - cron: '0 6 * * 1'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Composer audit (Dependency-CVEs)
        run: composer audit --no-interaction --locked

  sast:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Statische Security-Analyse (Taint/Pattern) über kuratierte Rulesets. --error → blockierend
      # bei ERROR-Findings. Baseline beim Einführen: 0 Findings über app/config/routes/bootstrap/database.
      - name: Semgrep SAST (fails on ERROR findings)
        run: |
          semgrep --config p/php --config p/security-audit --config p/secrets \
            --severity ERROR --error \
            app/ config/ routes/ bootstrap/ database/
